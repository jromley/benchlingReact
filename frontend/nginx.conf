resolver 10.89.0.1 valid=10s;

server {
    listen 80;
    server_name joshromley-projects.dev www.joshromley-projects.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name joshromley-projects.dev www.joshromley-projects.dev;

    ssl_certificate     /etc/letsencrypt/live/joshromley-projects.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joshromley-projects.dev/privkey.pem;

    location ~ ^/api/(?<api_path>.*)$ {
        set $backend_upstream http://backend:8000/$api_path$is_args$args;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
