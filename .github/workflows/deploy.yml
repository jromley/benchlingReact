name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check backend syntax
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python -m compileall app

  deploy:
    needs: build-check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Rebuild and restart services
        run: |
          set -e
          cd backend && podman build -t localhost/benchling-backend:latest -f Containerfile .
          cd ../frontend && podman build -t localhost/benchling-frontend:latest -f Containerfile.ci .
          systemctl --user restart backend.service
          systemctl --user restart frontend.service

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://joshromley-projects.dev/api/helloworld
